name: Instant SSH Server via bore.pub

on:
  workflow_dispatch:

jobs:
  create-ssh-server:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH Server
        run: |
          # Update and install required packages
          sudo apt-get update
          sudo apt-get install -y openssh-server curl

          # Configure SSH for password authentication
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config

          # Restart SSH service (correct service name is 'ssh', not 'sshd')
          sudo systemctl restart ssh

      - name: Create User 'runner' with Password '12345678'
        run: |
          # Create user if not exists
          if id "runner" &>/dev/null; then
            echo "User runner already exists"
          else
            sudo useradd -m -s /bin/bash runner
          fi
          # Set password
          echo "runner:12345678" | sudo chpasswd
          # Add to sudo group (optional)
          sudo usermod -aG sudo runner

      - name: Install bore-cli (fast tunnel)
        run: |
          # Download precompiled bore binary
          curl -L https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz | tar xz
          sudo mv bore /usr/local/bin/

      - name: Start bore tunnel and capture port
        id: bore
        run: |
          # Start bore tunnel in background, redirect output to file
          bore local 22 --to bore.pub > bore.log 2>&1 &
          sleep 3
          # Extract the public port from log
          PORT=$(grep -o 'bore.pub:[0-9]*' bore.log | head -1 | cut -d':' -f2)
          echo "port=$PORT" >> $GITHUB_OUTPUT
          echo "host=bore.pub" >> $GITHUB_OUTPUT

      - name: Display Connection Information
        run: |
          echo "=========================================="
          echo "✅ SSH SERVER IS READY!"
          echo "=========================================="
          echo ""
          echo "📡 CONNECT USING THESE DETAILS:"
          echo "   Host: bore.pub"
          echo "   Port: ${{ steps.bore.outputs.port }}"
          echo "   Username: runner"
          echo "   Password: 12345678"
          echo ""
          echo "📋 SSH COMMAND:"
          echo "   ssh runner@bore.pub -p ${{ steps.bore.outputs.port }}"
          echo ""
          echo "📱 TERMIUS SETTINGS:"
          echo "   Host: bore.pub"
          echo "   Port: ${{ steps.bore.outputs.port }}"
          echo "   User: runner"
          echo "   Password: 12345678"
          echo ""
          echo "⏱️  This tunnel will remain active for up to 2 hours."
          echo "=========================================="

      - name: Keep Runner Alive (2 hours max)
        run: |
          echo "Tunnel is active. Press Ctrl+C to stop early."
          # Keep the job running for up to 2 hours (7200 seconds)
          sleep 7200
